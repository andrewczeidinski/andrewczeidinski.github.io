          title: Andrew Czeidinski, PhD
          subtitle: "I work at the intersection of science, technology, and public policy, with experience spanning research, analysis, operations, and cross-sector engagement. My work focuses on turning complex technical and policy questions into usable strategy, clear evidence, and practical action. I currently serve in the National Science Board Office as an AAAS Science & Technology Policy Fellow, where I support work related to science and engineering indicators, policy analysis, and board-level discussions on the U.S. research and innovation enterprise. My background combines experimental physics, technical analysis, program operations, and public-interest problem solving. Across roles, I have worked on questions related to STEM talent, innovation capacity, research and development, data-driven decision support, and the institutions that shape science and technology in the United States."
